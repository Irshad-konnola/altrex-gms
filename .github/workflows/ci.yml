name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22' # Bumped to Node 22 to clear Supabase warning
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          # Dummy variables so Next.js can compile the Supabase client in CI
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder_key"